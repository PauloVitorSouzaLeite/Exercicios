<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="titulo">Estou aprendendo JavaScript !</h1>
    </header>
    <main>
        <input type="button" value="Clique aqui" id="botao">
    </main>
    <script>
        var trocar = document.getElementById("botao")
        var texto = document.querySelector("#titulo")
        trocar.addEventListener("click", mudar)
        function mudar() {
            texto.innerHTML = "Estou aprendendo a manipular o DOM !!!"
        }
    </script>
</body>
</html>
