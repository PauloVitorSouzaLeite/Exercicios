<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <table>
            <colgroup>
                <col>
                <col>
                <col>
                <col id="cor">
            </colgroup>
            <caption>Boletim escolar</caption>
            <thead>
                <tr>
                    <th scope="col">Disciplina</th>
                    <th scope="col">Nota 1</th>
                    <th scope="col">Nota 2</th>
                    <th scope="col">Média</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Matemática</td>
                    <td>5.0</td>
                    <td>8.0</td>
                    <td>6.0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td>6.0</td>
                    <td>9.0</td>
                    <td>7.5</td>
                </tr>
                <tr>
                    <td>História</td>
                    <td>3.0</td>
                    <td>8.0</td>
                    <td>5.5</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <th colspan="3" scope="row">Média geral</th>
                    <td>19.0</td>
                </tr>
            </tfoot>
        </table>
    </main>
</body>
</html>
